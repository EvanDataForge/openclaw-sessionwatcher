<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sessionwatcher · OpenClaw</title>
<style>
  /* ── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #151820;
    --border:   #252a35;
    --text:     #c8cdd8;
    --muted:    #5a6175;
    --accent:   #4f8ef7;
    --green:    #3ecf6e;
    --orange:   #f5a623;
    --red:      #f75454;
    --purple:   #a67bff;
    --teal:     #2dd4bf;
    --yellow:   #facc15;

    --type-main:     var(--accent);
    --type-group:    var(--teal);
    --type-telegram: var(--purple);
    --type-cron:     var(--yellow);
    --type-subagent: var(--orange);
    --type-other:    var(--muted);
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, monospace;
    font-size: 13px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Layout ───────────────────────────────────────────── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--accent);
  }
  #header h1 span { color: var(--muted); font-weight: 400; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .4; }
  }

  .badge-stat {
    background: var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .badge-stat strong { color: var(--text); }

  #refresh-info {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }
  #refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 3px 10px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  #body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Left: Session List ───────────────────────────────── */
  #sidebar {
    width: 420px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #sidebar-header h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }

  #filter-bar {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    padding: 2px 8px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all .15s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #session-list {
    overflow-y: auto;
    flex: 1;
  }
  #session-list::-webkit-scrollbar { width: 4px; }
  #session-list::-webkit-scrollbar-track { background: transparent; }
  #session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .session-card {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
    position: relative;
  }
  .session-card:hover { background: rgba(79,142,247,.06); }
  .session-card.selected { background: rgba(79,142,247,.12); border-left: 2px solid var(--accent); }
  .session-card.selected { padding-left: 12px; }
  .session-card.unread { border-left: 2px solid var(--orange); padding-left: 12px; background: rgba(245,166,35,.06); }
  .unread-dot { width:6px; height:6px; background:var(--orange); border-radius:50%; flex-shrink:0; animation: unread-pulse 1.4s ease-in-out infinite; }
  @keyframes unread-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  .card-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .type-main     { background: rgba(79,142,247,.2);  color: var(--type-main); }
  .type-group    { background: rgba(45,212,191,.2);  color: var(--type-group); }
  .type-telegram { background: rgba(166,123,255,.2); color: var(--type-telegram); }
  .type-cron     { background: rgba(250,204,21,.2);  color: var(--type-cron); }
  .type-subagent { background: rgba(245,166,35,.2);  color: var(--type-subagent); }
  .type-other    { background: rgba(90,97,117,.2);   color: var(--type-other); }

  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .active-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .ss-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ss-dot.ss-active  { background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
  .ss-dot.ss-stopped { background: var(--red); }
  .ss-dot.ss-stale   { background: #6b2020; }

  .card-row2 {
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
  }
  .card-model { color: var(--accent); opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .card-sep { color: var(--border); }
  .card-time { white-space: nowrap; }
  .card-msgs { margin-left: auto; white-space: nowrap; }

  /* ── Right: Detail Panel ──────────────────────────────── */
  #detail {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #detail-header {
    padding: 10px 18px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
  }
  #detail-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #detail-meta {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  #detail-stats {
    display: flex;
    gap: 16px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .stat-value { font-size: 13px; font-weight: 600; color: var(--text); }
  .stat-value.green  { color: var(--green); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.orange { color: var(--orange); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-bubble {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 90%;
  }
  .msg-bubble.user     { align-self: flex-end; align-items: flex-end; }
  .msg-bubble.assistant { align-self: flex-start; }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--muted);
  }
  .msg-role {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .msg-role.user      { color: var(--teal); }
  .msg-role.assistant { color: var(--purple); }
  .msg-role.toolresult { color: var(--green); }
  .msg-model { color: var(--muted); }

  .msg-id-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: monospace;
    font-size: 10px;
    color: var(--muted);
    user-select: none;
  }
  .msg-id-chip .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    padding: 0 1px;
    line-height: 1;
    transition: color .15s;
  }
  .msg-id-chip .copy-btn:hover { color: var(--accent); }
  .msg-id-chip .chip-text { user-select: none; cursor: default; }
  /* base style for all copy/action buttons */
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    opacity: 0.45;
    transition: opacity .15s, color .15s;
    font-family: inherit;
  }
  .copy-btn:hover { opacity: 1; color: var(--accent); }
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-bubble.user .msg-body {
    background: rgba(79,142,247,.08);
    border-color: rgba(79,142,247,.2);
  }
  .msg-bubble.assistant .msg-body {
    background: rgba(166,123,255,.06);
    border-color: rgba(166,123,255,.15);
  }

  /* ── Session event markers ── */
  .msg-event {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.75;
  }
  .msg-event::before, .msg-event::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .msg-event .ev-tag {
    white-space: nowrap;
    padding: 1px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
  }
  .msg-event.ev-thinking .ev-tag { color: #b8a830; border-color: rgba(250,204,21,.25); }
  .msg-event.ev-model .ev-tag { color: var(--accent); border-color: rgba(79,142,247,.25); }
  .msg-event .ev-time { margin-left: 4px; font-size: 9px; opacity: 0.6; }

  /* ── Raw modal ── */
  #raw-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #raw-modal.open { display: flex; }
  #raw-modal-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: min(940px, 92vw);
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
  }
  #raw-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  #raw-modal-title { color: var(--muted); font-family: monospace; }
  #raw-modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color .15s;
  }
  #raw-modal-close:hover { color: var(--text); }
  #raw-modal-body {
    overflow-y: auto;
    padding: 12px 14px;
    font-family: monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--muted);
    flex: 1;
    line-height: 1.5;
  }
  /* JSON syntax highlighting */
  .json-key  { color: #79b8ff; }
  .json-str  { color: #9ecbff; }
  .json-num  { color: #f8c555; }
  .json-bool { color: #f97583; }
  .json-null { color: #f97583; }

  /* ── Block types within a message ── */
  .block-thinking {
    background: rgba(250,204,21,.05);
    border: 1px solid rgba(250,204,21,.2);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 10.5px;
    line-height: 1.4;
    color: #b8a830;
    margin-bottom: 0;
  }
  .block-thinking-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #b8a830;
    margin-bottom: 2px;
    opacity: .7;
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
  }
  .block-thinking-label:hover { opacity: 1; }
  .block-thinking-toggle { font-size: 8px; transition: transform .15s; }
  .block-thinking.collapsed .block-thinking-toggle { transform: rotate(-90deg); }
  .block-thinking-body { margin-top: 3px; white-space: pre-wrap; word-break: break-word; }
  .block-thinking.collapsed .block-thinking-body { display: none; }
  .block-thinking:has(+ .thinking-tc-bridge) {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }
  .thinking-tc-bridge {
    background: rgba(250,204,21,.03);
    border-left: 1px solid rgba(250,204,21,.2);
    border-right: 1px solid rgba(250,204,21,.2);
    padding: 2px 8px;
    font-size: 9px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .thinking-tc-bridge + .block-toolcall {
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    margin-top: 0;
  }
  .block-toolcall {
    background: rgba(79,142,247,.07);
    border: 1px solid rgba(79,142,247,.25);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .block-toolcall-header {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .block-toolcall-args {
    font-size: 10px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .block-toolresult {
    background: rgba(62,207,110,.05);
    border: 1px solid rgba(62,207,110,.2);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .block-toolresult.error {
    background: rgba(247,84,84,.05);
    border-color: rgba(247,84,84,.25);
  }
  .block-toolresult-header {
    font-size: 10px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .block-toolresult.error .block-toolresult-header { color: var(--red); }
  .block-toolresult-preview {
    font-size: 10px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 120px;
    overflow-y: auto;
  }
  .show-all-btn {
    display: inline-block;
    margin-top: 3px;
    font-size: 9px;
    color: var(--accent);
    opacity: .7;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    font-family: inherit;
  }
  .show-all-btn:hover { opacity: 1; text-decoration: underline; }

  .msg-footer {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tok-in  { color: var(--teal); }
  .tok-out { color: var(--orange); }

  /* ── Stop reason badge ── */
  .stop-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid;
  }
  .stop-stop     { color: var(--green);  border-color: rgba(62,207,110,.4);  background: rgba(62,207,110,.08); }
  .stop-tooluse  { color: var(--green);  border-color: rgba(62,207,110,.4);  background: rgba(62,207,110,.08); }
  .stop-maxtokens{ color: var(--orange); border-color: rgba(245,166,35,.4);  background: rgba(245,166,35,.08); }
  .stop-error    { color: var(--red);    border-color: rgba(247,84,84,.4);   background: rgba(247,84,84,.08); }
  .stop-aborted  { color: var(--red);    border-color: rgba(247,84,84,.4);   background: rgba(247,84,84,.08); }
  .stop-other    { color: var(--muted);  border-color: var(--border);        background: transparent; }

  /* ── Thinking-only warning ── */
  .thinking-only-warning {
    margin-top: 6px;
    padding: 6px 10px;
    background: rgba(247,84,84,.07);
    border: 1px solid rgba(247,84,84,.25);
    border-radius: 4px;
    font-size: 11px;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Floating scroll-to-bottom button ── */
  #scroll-btn {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--accent);
    padding: 5px 14px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 5px;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
    transition: border-color .15s, background .15s;
    z-index: 10;
  }
  #scroll-btn:hover { background: rgba(79,142,247,.12); border-color: var(--accent); }
  #scroll-btn.visible { display: flex; }
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: .4; }
  .empty-text { font-size: 12px; }

  /* ── Loading ──────────────────────────────────────────── */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 12px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 8px;
  }

  /* ── Scrollbar global ────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<div id="header">
  <div class="status-dot" id="status-dot"></div>
  <h1>Sessionwatcher <span>· OpenClaw</span></h1>
  <div class="badge-stat">Sessions: <strong id="hdr-count">…</strong></div>
  <div class="badge-stat">Last refresh: <strong id="hdr-time">…</strong></div>
  <div id="refresh-info" id="countdown"></div>
  <button id="refresh-btn" onclick="App.refresh()">↻ Refresh</button>
</div>

<!-- ── Body ───────────────────────────────────────────── -->
<div id="body">

  <!-- Left sidebar: session list -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Active Sessions</h2>
      <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="window-label"></span>
    </div>
    <div id="filter-bar">
      <button class="filter-btn active" data-type="all" onclick="App.setFilter('all',this)">All</button>
      <button class="filter-btn" data-type="main"     onclick="App.setFilter('main',this)">Direct</button>
      <button class="filter-btn" data-type="group"    onclick="App.setFilter('group',this)">TG Group</button>
      <button class="filter-btn" data-type="telegram" onclick="App.setFilter('telegram',this)">Telegram</button>
      <button class="filter-btn" data-type="cron"     onclick="App.setFilter('cron',this)">Cron</button>
      <button class="filter-btn" data-type="subagent" onclick="App.setFilter('subagent',this)">Subagent</button>
    </div>
    <div id="session-list">
      <div class="loader"><div class="spinner"></div> Loading…</div>
    </div>
  </div>

  <!-- Right: detail panel -->
  <div id="detail">
    <div id="detail-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span id="detail-title" style="color:var(--muted);font-weight:400">← Select a session</span>
        <span id="detail-meta" style="font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap"></span>
      </div>
    </div>
    <div id="detail-stats" style="display:none"></div>
    <div id="messages">
      <div class="empty">
        <div class="empty-icon">📡</div>
        <div class="empty-text">Select a session to view messages</div>
      </div>
    </div>    <button id="scroll-btn" onclick="Scroll.toBottom()">↓ Zum Ende</button>  </div>

</div>

<div id="raw-modal" onclick="if(event.target===this)closeRawModal()">
  <div id="raw-modal-box">
    <div id="raw-modal-header">
      <span id="raw-modal-title">Raw JSON</span>
      <button id="raw-modal-close" onclick="closeRawModal()">✕</button>
    </div>
    <div id="raw-modal-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
const State = {
  sessions: [],
  filter: 'all',
  selectedId: null,
  detailSessionId: null,   // session currently shown in detail
  lastMsgCount: 0,         // msg count on last render
  lastRefresh: null,
  countdown: 10,
  timer: null,
  loading: false,
  unread: new Set(),        // session IDs with unseen new messages
  prevMsgCounts: {},        // session_id → last seen msg_count
  thinkingStates: {},      // key → true(expanded)/false(collapsed) per thinking block
  thinkingDefaultExpanded: true, // default for newly rendered blocks
};

// ─────────────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────────────
const API = {
  async sessions() {
    const r = await fetch('/api/sessions');
    if (!r.ok) throw new Error('API error');
    return r.json();
  },
  async messages(sessionId) {
    const r = await fetch(`/api/sessions/${sessionId}/messages`);
    if (!r.ok) throw new Error('API error');
    return r.json();
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Scroll management
// ─────────────────────────────────────────────────────────────────────────────
const Scroll = {
  _el: null,
  _btn: null,
  _threshold: 60, // px from bottom = "at bottom"

  init() {
    this._el  = document.getElementById('messages');
    this._btn = document.getElementById('scroll-btn');
    this._el.addEventListener('scroll', () => this._onScroll(), { passive: true });
  },

  isAtBottom() {
    const el = this._el;
    if (!el) return true;
    return el.scrollHeight - el.scrollTop - el.clientHeight <= this._threshold;
  },

  toBottom() {
    // Double-rAF ensures the browser has finished layout before we scroll
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        this._el.scrollTop = this._el.scrollHeight;
        this._onScroll();
      });
    });
  },

  // Call before re-rendering messages to snapshot position
  snapshotCount() {
    return this._el ? this._el.querySelectorAll('.msg-bubble').length : 0;
  },

  // Call after re-rendering: scroll if was-at-bottom AND new messages arrived
  maybeScroll(wasAtBottom, prevCount) {
    const newCount = this.snapshotCount();
    if (wasAtBottom && newCount > prevCount) {
      this.toBottom();
    }
    this._onScroll();
  },

  _onScroll() {
    if (!this._btn) return;
    this._btn.classList.toggle('visible', !this.isAtBottom());
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────────────────────────────────────
const RawStore = {};
const ToolFullStore = {};

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function escText(s) {
  return esc(s).replace(/\n/g, '<br>');
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+'M';
  if (n >= 1_000)     return (n/1_000).toFixed(1)+'k';
  return String(n);
}

function fmtCost(c) {
  if (!c) return '$0.0000';
  return '$'+c.toFixed(4);
}

function isRecent(s) {
  // updated in last 10 minutes
  const nowMs = Date.now();
  // s.updated_at is epoch ms
  return (nowMs - (s.updated_at || 0)) < 10 * 60 * 1000;
}

// ─────────────────────────────────────────────────────────────────────────────
// Session list renderer
// ─────────────────────────────────────────────────────────────────────────────
function renderSessionList() {
  const list = document.getElementById('session-list');
  const filtered = (State.filter === 'all'
    ? State.sessions
    : State.sessions.filter(s => s.type === State.filter)
  ).filter(s => (s.msg_count || 0) > 0);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty" style="height:200px">
      <div class="empty-icon">🔇</div>
      <div class="empty-text">No sessions found</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const selected = s.session_id === State.selectedId ? ' selected' : '';
    const unread   = State.unread.has(s.session_id) ? ' unread' : '';
    const STOP_REASONS = new Set(['stop','error','length','aborted']);
    const lastStop = s.last_stop_reason || '';
    const recent   = isRecent(s);
    const stopped  = STOP_REASONS.has(lastStop);
    let statusDot = '';
    if (recent && stopped) {
      statusDot = `<div class="ss-dot ss-stopped" title="Last stop: ${esc(lastStop)}"></div>`;
    } else if (recent && !stopped) {
      statusDot = `<div class="ss-dot ss-active" title="Aktiv (letzte 10 Min)"></div>`;
    } else if (s.msg_count > 0) {
      statusDot = `<div class="ss-dot ss-stale" title="${stopped ? 'Stop: '+esc(lastStop)+' · ' : ''}Keine Aktivität seit > 10 Min"></div>`;
    }
    const unreadDot = State.unread.has(s.session_id) ? `<div class="unread-dot" title="New messages"></div>` : '';
    const typeClass = `type-${s.type}`;
    const model = s.model && s.model !== '—' ? s.model : '';
    const modelShort = model.length > 22 ? model.slice(0,22)+'…' : model;

    return `<div class="session-card${selected}${unread}" data-id="${esc(s.session_id)}" onclick="App.selectSession('${esc(s.session_id)}')">
      <div class="card-row1">
        <span class="type-badge ${typeClass}">${esc(s.type_label)}</span>
        <span class="card-label" title="${esc(s.label)}">${esc(s.label)}</span>
        ${statusDot}${unreadDot}
      </div>
      <div class="card-row2">
        ${modelShort ? `<span class="card-model" title="${esc(model)}">${esc(modelShort)}</span><span class="card-sep">·</span>` : ''}
        <span class="card-time">${esc(s.time_ago)}</span>
        <span class="card-msgs">${s.msg_count ? `${s.msg_count} msgs` : '—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// Detail panel renderer
// ─────────────────────────────────────────────────────────────────────────────
function renderDetailHeader(s) {
  const typeClass = `type-${s.type}`;
  document.getElementById('detail-title').innerHTML =
    `<span class="type-badge ${typeClass}">${esc(s.type_label)}</span> &nbsp;${esc(s.label)}`;

  const metaEl = document.getElementById('detail-meta');
  if (metaEl) metaEl.textContent = `${s.agent} · ${s.last_channel || 'unknown channel'}`;
}

function renderDetailStats(s) {
  const stats = document.getElementById('detail-stats');
  stats.style.display = 'flex';
  stats.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">Last Activity</div>
      <div class="stat-value accent">${esc(s.time_ago)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Messages</div>
      <div class="stat-value">${s.msg_count || 0}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Input Tokens</div>
      <div class="stat-value">${fmtTokens(s.total_input)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Output Tokens</div>
      <div class="stat-value">${fmtTokens(s.total_output)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Model</div>
      <div class="stat-value" style="font-size:11px">${esc(s.model || '—')}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Session ID</div>
      <div class="stat-value" style="font-size:10px;font-family:monospace;display:flex;align-items:center;gap:4px">
        <span title="${esc(s.session_id)}" style="user-select:none">${esc(s.session_id.slice(0,8))}&hellip;</span>
        <button class="copy-btn" style="font-size:12px;padding:0 3px" onclick="copyMsgId('${esc(s.session_id)}',this)" title="Session-ID kopieren">⧉</button>
      </div>
    </div>
  `;
}

function stopBadge(reason) {
  if (!reason) return '';
  const map = {
    'stop':        ['stop-error',    '✗ stop'],
    'toolUse':     ['stop-tooluse',   '⚙ tool_use'],
    'tool_use':    ['stop-tooluse',   '⚙ tool_use'],
    'max_tokens':  ['stop-maxtokens', '⚠ max_tokens'],
    'maxTokens':   ['stop-maxtokens', '⚠ max_tokens'],
    'error':       ['stop-error',     '✗ error'],
    'aborted':     ['stop-aborted',   '✗ aborted'],
    'length':      ['stop-error',     '✗ length'],
  };
  const [cls, label] = map[reason] || ['stop-other', reason];
  return `<span class="stop-badge ${cls}">${esc(label)}</span>`;
}

function syntaxHighlight(str) {
  let obj;
  try { obj = JSON.parse(str); } catch(e) { return esc(str); }
  const pretty = JSON.stringify(obj, null, 2);
  return pretty
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(
      /("|')((?:\\.|(?!\1)[^\\])*)\1(\s*:)?|\b(true|false|null)\b|(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,
      (m, q, _val, colon, kw, num) => {
        if (kw)  return `<span class="json-${kw==='null'?'null':'bool'}">${m}</span>`;
        if (num) return `<span class="json-num">${m}</span>`;
        if (colon) return `<span class="json-key">${m}</span>`;
        return `<span class="json-str">${m.replace(/\\n/g,'<br>')}</span>`;
      }
    );
}

function showToolFull(key) {
  const previewEl = document.querySelector(`.block-toolresult-preview[data-trkey="${key}"]`);
  const full = ToolFullStore[key] || '';
  if (!previewEl || !full) return;
  previewEl.innerHTML = escText(full);
  previewEl.style.maxHeight = 'none';
  const btn = document.querySelector(`.show-all-btn[data-trkey="${key}"]`);
  if (btn) btn.remove();
}

function toggleThinkingBlock(key) {
  State.thinkingStates[key] = !State.thinkingStates[key];
  const el = document.querySelector(`.block-thinking[data-key="${key}"]`);
  if (el) el.classList.toggle('collapsed', !State.thinkingStates[key]);
}

function renderBlock(b, key) {
  if (b.kind === 'thinking') {
    const expanded = key in State.thinkingStates ? State.thinkingStates[key] : State.thinkingDefaultExpanded;
    State.thinkingStates[key] = expanded;
    const collapsed = expanded ? '' : ' collapsed';
    return `<div class="block-thinking${collapsed}" data-key="${esc(key)}"><div class="block-thinking-label" onclick="toggleThinkingBlock('${esc(key)}')"><span class="block-thinking-toggle">▼</span> 💭 Thinking</div><div class="block-thinking-body">${escText(b.text.trim())}</div></div>`;
  }
  if (b.kind === 'toolCall') {
    return `<div class="block-toolcall">
      <div class="block-toolcall-header">⚙ Tool call: <strong>${esc(b.name)}</strong></div>
      <div class="block-toolcall-args">${esc(b.args)}</div>
    </div>`;
  }
  if (b.kind === 'toolResult') {
    const errClass = b.is_error ? ' error' : '';
    const icon = b.is_error ? '✗' : '✓';
    const trimmed = b.total_chars > 300;
    const chars = trimmed ? ` · ${b.total_chars} chars` : '';
    const trKey = `${key}-tr`;
    if (trimmed) ToolFullStore[trKey] = b.text_full || b.text;
    const showAllBtn = trimmed
      ? `<button class="show-all-btn" data-trkey="${esc(trKey)}" onclick="showToolFull('${esc(trKey)}')">(show all)</button>` : '';
    return `<div class="block-toolresult${errClass}">
      <div class="block-toolresult-header">${icon} Result: <strong>${esc(b.name)}</strong><span style="font-weight:400;color:var(--muted)">${chars}</span></div>
      <div class="block-toolresult-preview" data-trkey="${esc(trKey)}">${escText(b.text)}</div>${showAllBtn}
    </div>`;
  }
  if (b.kind === 'text' && b.text) {
    return `<div class="msg-body">${escText(b.text)}</div>`;
  }
  return '';
}

function renderMessages(messages) {
  const el = document.getElementById('messages');
  // Clear raw cache
  Object.keys(RawStore).forEach(k => delete RawStore[k]);

  if (!messages.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No messages in this session yet</div>
    </div>`;
    return;
  }

  el.innerHTML = messages.map((m, idx) => {
    // ── Event markers (thinking/model change) ──
    if (m.role === 'event') {
      RawStore[idx] = m.raw_json || '';
      return `<div class="msg-event ev-${esc(m.event_type)}" data-msgidx="${idx}">
        <span class="ev-tag">⚡ ${esc(m.text)}</span>
        <span class="ev-time">${esc(m.ts_fmt)}</span>
      </div>`;
    }

    const isToolResult = m.role === 'toolResult';
    const roleClass = m.role === 'user' ? 'user' : (isToolResult ? 'toolresult' : 'assistant');

    // ── Header ──
    let roleLabel = m.role;
    if (isToolResult) roleLabel = `result:${m.tool_name}`;
    const modelInfo = !isToolResult && m.model && m.model !== '—'
      ? `<span class="msg-model">${esc(m.model)}</span>` : '';
    const errBadge = isToolResult && m.is_error
      ? `<span style="color:var(--red);font-size:10px">ERROR</span>` : '';

    // ── Body ──
    let bodyHtml = '';
    if (isToolResult) {
      const chars = m.total_chars > 300 ? ` · ${m.total_chars} chars total` : '';
      const errClass = m.is_error ? ' error' : '';
      const trimmed = m.total_chars > 300;
      const trKey = `${idx}-tr`;
      if (trimmed) ToolFullStore[trKey] = m.text_full || m.text;
      const showAllBtn = trimmed
        ? `<button class="show-all-btn" data-trkey="${esc(trKey)}" onclick="showToolFull('${esc(trKey)}')">(show all)</button>` : '';
      bodyHtml = `<div class="block-toolresult${errClass}" style="margin:0">
        <div class="block-toolresult-header">${m.is_error?'✗':'✓'} ${esc(m.tool_name)}<span style="font-weight:400;color:var(--muted)">${chars}</span></div>
        <div class="block-toolresult-preview" data-trkey="${esc(trKey)}">${escText(m.text || '(empty)')}</div>${showAllBtn}
      </div>`;
    } else if (m.blocks && m.blocks.length > 0) {
      bodyHtml = m.blocks.map((b, bi) => {
        let html = renderBlock(b, `${idx}-${bi}`);
        const next = m.blocks[bi + 1];
        if (b.kind === 'thinking' && next?.kind === 'toolCall' && m.stop_reason) {
          html += `<div class="thinking-tc-bridge">↳ ${stopBadge(m.stop_reason)}</div>`;
        }
        return html;
      }).join('');
      if (!bodyHtml.trim()) {
        bodyHtml = `<div class="msg-body" style="color:var(--muted);font-style:italic">(no text content)</div>`;
      }
    } else {
      bodyHtml = `<div class="msg-body">${escText(m.text || '(empty)')}</div>`;
    }

    // ── Footer: tokens ──
    const tokInfo = !isToolResult && m.role === 'assistant' && (m.input_tok || m.output_tok)
      ? `<span class="tok-in">▲${fmtTokens(m.input_tok)}</span> <span class="tok-out">▼${fmtTokens(m.output_tok)}</span>` : '';

    // ── Raw (stored in RawStore, opened via modal) ──
    const rawContent = m.raw_json || '';
    RawStore[idx] = rawContent;

    // ── Stop reason + thinking-only warning ──
    const stopBadgeHtml = !isToolResult ? stopBadge(m.stop_reason) : '';
    const hasTextOutput = !isToolResult && (m.blocks||[]).some(b => b.kind === 'text' && b.text && b.text.trim());
    const hasThinking   = !isToolResult && (m.blocks||[]).some(b => b.kind === 'thinking');
    const hasToolCalls  = !isToolResult && (m.blocks||[]).some(b => b.kind === 'toolCall');
    const thinkingOnlyWarning = m.role === 'assistant' && (
      (hasThinking && !hasTextOutput && !hasToolCalls)
      || m.stop_reason === 'length'
    ) ? (() => {
      if (m.stop_reason === 'length') {
        return `<div class="thinking-only-warning">⚠ Output truncated — max token limit reached (LENGTH)</div>`;
      }
      return `<div class="thinking-only-warning">⚠ Stopped after thinking — no text or tool call produced (stopReason: ${esc(m.stop_reason || 'unknown')})</div>`;
    })() : '';

    return `<div class="msg-bubble ${isToolResult ? 'assistant' : roleClass}" data-msgidx="${idx}">
      <div class="msg-header">
        <span class="msg-role ${isToolResult ? 'assistant' : roleClass}" style="${isToolResult ? 'color:var(--green)' : ''}">${esc(roleLabel)}</span>
        ${modelInfo}${errBadge}${stopBadgeHtml}
        ${m.id ? `<span class="msg-id-chip" title="${esc(m.id)}"><span class="chip-text">${esc(m.id.slice(0,8))}</span><button class="copy-btn" onclick="copyMsgId('${esc(m.id)}',this)" title="ID kopieren">⧉</button><button class="copy-btn" onclick="openRawModal(${idx})" title="Raw JSON anzeigen">{raw}</button></span>` : ''}
        <span style="margin-left:auto">${esc(m.ts_fmt)}</span>
      </div>
      ${bodyHtml}
      ${thinkingOnlyWarning}
      ${tokInfo ? `<div class="msg-footer">${tokInfo}</div>` : ''}
    </div>`;
  }).join('');

  Scroll._onScroll(); // update button visibility
}

// ─────────────────────────────────────────────────────────────────────────────
// App controller
// ─────────────────────────────────────────────────────────────────────────────
const App = {

  async init() {
    Scroll.init();
    await this.refresh();
    this.startCountdown();
  },

  startCountdown() {
    if (State.timer) clearInterval(State.timer);
    State.countdown = 10;
    State.timer = setInterval(() => {
      State.countdown--;
      document.getElementById('refresh-info').textContent = `Auto-refresh in ${State.countdown}s`;
      if (State.countdown <= 0) {
        this.refresh();
        State.countdown = 10;
      }
    }, 1000);
  },

  async refresh() {
    if (State.loading) return;
    State.loading = true;
    document.getElementById('status-dot').className = 'status-dot';

    // Snapshot old msg counts for unread detection
    const oldCounts = {};
    State.sessions.forEach(s => { oldCounts[s.session_id] = s.msg_count || 0; });
    const firstLoad = Object.keys(oldCounts).length === 0;

    try {
      const data = await API.sessions();
      State.sessions   = data.sessions || [];
      State.lastRefresh = data.generated_fmt || '';

      // Detect new messages in non-selected sessions (skip on first load)
      if (!firstLoad) {
        State.sessions.forEach(s => {
          const prev = oldCounts[s.session_id];
          const curr = s.msg_count || 0;
          if (prev !== undefined && curr > prev && s.session_id !== State.selectedId) {
            State.unread.add(s.session_id);
          }
        });
      }

      document.getElementById('hdr-count').textContent = data.count ?? 0;
      document.getElementById('hdr-time').textContent  = data.generated_fmt || '—';
      document.getElementById('window-label').textContent = `last ${data.active_window_h}h`;

      renderSessionList();

      // If a session was selected, refresh its messages too
      if (State.selectedId) {
        const still = State.sessions.find(s => s.session_id === State.selectedId);
        if (still) await this._loadDetail(still, true);
      }

    } catch (e) {
      document.getElementById('status-dot').className = 'status-dot error';
      console.error('Refresh failed', e);
    } finally {
      State.loading = false;
      State.countdown = 10;
    }
  },

  setFilter(type, btn) {
    State.filter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSessionList();
  },

  async selectSession(sessionId) {
    State.selectedId = sessionId;
    State.unread.delete(sessionId);
    // Update selected/unread highlight
    document.querySelectorAll('.session-card').forEach(el => {
      el.classList.toggle('selected', el.dataset.id === sessionId);
      if (el.dataset.id === sessionId) el.classList.remove('unread');
    });
    // Remove unread dot from card if present
    const card = document.querySelector(`.session-card[data-id="${sessionId}"]`);
    if (card) card.querySelector('.unread-dot')?.remove();

    const s = State.sessions.find(x => x.session_id === sessionId);
    if (!s) return;

    await this._loadDetail(s);
  },

  async _loadDetail(s, isRefresh = false) {
    renderDetailHeader(s);
    renderDetailStats(s);

    const msgEl = document.getElementById('messages');
    const isSameSession = State.detailSessionId === s.session_id;
    const wasAtBottom   = Scroll.isAtBottom();
    const prevCount     = State.lastMsgCount;

    // Only show spinner on first load of a session
    if (!isRefresh || !isSameSession) {
      msgEl.innerHTML = '<div class="loader"><div class="spinner"></div> Loading messages…</div>';
    }

    // Save scroll position before re-render (for refresh of same session)
    const savedScrollTop = (isRefresh && isSameSession) ? msgEl.scrollTop : null;

    try {
      const data = await API.messages(s.session_id);
      const msgs = data.messages || [];
      const newCount = msgs.length;

      State.detailSessionId = s.session_id;
      State.lastMsgCount    = newCount;

      renderMessages(msgs);

      if (isRefresh && isSameSession) {
        // Restore position if no new messages came in, else smart scroll
        if (newCount > prevCount && wasAtBottom) {
          Scroll.toBottom();
        } else {
          // Restore saved scroll position after re-render
          if (savedScrollTop !== null) {
            requestAnimationFrame(() => {
              msgEl.scrollTop = savedScrollTop;
              Scroll._onScroll();
            });
          } else {
            Scroll._onScroll();
          }
        }
      } else {
        // Fresh load — scroll to bottom
        Scroll.toBottom();
      }
    } catch(e) {
      if (!isRefresh || !isSameSession) {
        msgEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load messages</div></div>`;
      }
    }
  },
};

function copyMsgId(fullId, btn) {
  navigator.clipboard.writeText(fullId).then(() => {
    const prev = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = prev, 1200);
  }).catch(() => {});
}

function openRawModal(idx) {
  const content = RawStore[idx] ?? '';
  document.getElementById('raw-modal-body').innerHTML = syntaxHighlight(content);
  document.getElementById('raw-modal-title').textContent = 'Raw JSON — #' + idx;
  document.getElementById('raw-modal').classList.add('open');
}

function closeRawModal() {
  document.getElementById('raw-modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRawModal(); });
